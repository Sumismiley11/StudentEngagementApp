<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password — SVV Platform</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><span class="dot"></span>Password Recovery</div>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
        <input type="hidden" name="step" value="{{ step }}">
        
        {% if step == 1 %}
            <div class="form-group">
                <label class="form-label">Enter your Username</label>
                <input type="text" name="username" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Find Account</button>
            
        {% elif step == 2 %}
            <input type="hidden" name="username" value="{{ username }}">
            <div class="form-group">
                <label class="form-label">Security Question</label>
                <p style="margin-bottom: 0.5rem; color: var(--text);">{{ question }}</p>
                <input type="text" name="answer" placeholder="Your answer" required>
            </div>
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="new_password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
        {% endif %}
    </form>
    <div class="auth-footer"><br><a href="/login">Back to Login</a></div>
  </div>
</div>
</body>
</html>
